spring:
  application:
    name: fantastic-journey
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:mydb}
    username: ${POSTGRES_USER:admin}
    password: ${POSTGRES_PASSWORD:secret}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: shop
  flyway:
    enabled: false
  ai:
    ollama:
      # URL du serveur Ollama (API HTTP). Par défaut localhost — insuffisant si l'app est dans WSL2 et Ollama sur Windows.
      # Exemple WSL2 → Windows : export OLLAMA_BASE_URL=http://$(awk '/nameserver/{print $2; exit}' /etc/resolv.conf):11434
      base-url: ${OLLAMA_BASE_URL:http://172.19.224.1:11434}
      chat:
        options:
          model: llama3.2
          temperature: 0.1

server:
  port: 8081
