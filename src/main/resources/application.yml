spring:
  application:
    name: fantastic-journey
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:mydb}
    username: ${POSTGRES_USER:admin}
    password: ${POSTGRES_PASSWORD:secret}
  ai:
    ollama:
      # Ollama sur Windows, Spring dans WSL : localhost WSL != Ollama ; IP hôte Windows (vEthernet).
      # Surcharge : export OLLAMA_BASE_URL=http://<ip>:11434 si cette IP change au redemarrage.
      base-url: ${OLLAMA_BASE_URL:http://172.19.224.1:11434}
      chat:
        options:
          model: llama3.2

server:
  port: 8081

app:
  database:
    schema: shop
